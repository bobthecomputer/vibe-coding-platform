<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta content="#10231f" name="theme-color" />
    <title>Fluxio offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8f5;
        color: #10231f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid rgba(16, 35, 31, 0.16);
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 18px 54px rgba(16, 35, 31, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #51615b;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fluxio is waiting for the NAS connection.</h1>
      <p>The app shell is available offline. Reconnect to Tailscale or the local network to refresh mission state, proofs, and notifications.</p>
    </main>
  </body>
</html>
